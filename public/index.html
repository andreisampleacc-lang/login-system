<!DOCTYPE html>
<html>
<head>
<title>Biometric System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script defer src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box {
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    width:300px;
}
video {
    width:100%;
    border-radius:10px;
}
button,input {
    margin:5px;
    padding:10px;
    width:90%;
}
.status {
    font-size:14px;
    margin-top:5px;
    color:green;
}
</style>
</head>

<body>

<div class="box">
<h2>Biometric Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="scanFingerprint()">Scan Fingerprint</button>
<div id="fpStatus" class="status"></div>

<button onclick="scanFace()">Scan Face</button>
<div id="faceStatus" class="status"></div>

<br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<br><br>

<video id="video" autoplay muted></video>
</div>

<script>

let savedFingerprint = null;
let savedFace = null;

// =======================
// LOAD MODELS
// =======================
async function loadModels(){
    await faceapi.nets.tinyFaceDetector.loadFromUri('/models/tiny_face_detector');
    await faceapi.nets.faceLandmark68Net.loadFromUri('/models/face_landmark_68');
    await faceapi.nets.faceRecognitionNet.loadFromUri('/models/face_recognition');
}
loadModels();

// =======================
// CAMERA
// =======================
async function startCamera(){
    const video = document.getElementById("video");
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" }
    });
    video.srcObject = stream;
}

// =======================
// FINGERPRINT BUTTON
// =======================
async function scanFingerprint(){
    try {
        const res = await fetch('http://localhost:5000/scan-fingerprint');
        const data = await res.json();

        if(data.success){
            savedFingerprint = data.template;
            document.getElementById("fpStatus").innerText = "✅ Fingerprint captured";
        } else {
            alert("Fingerprint failed");
        }
    } catch(err){
        alert("Fingerprint server not running");
    }
}

// =======================
// FACE BUTTON
// =======================
async function scanFace(){
    await startCamera();

    document.getElementById("faceStatus").innerText = "📸 Scanning...";

    await new Promise(resolve => setTimeout(resolve, 2000));

    const video = document.getElementById("video");

    const detection = await faceapi
        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
        .withFaceLandmarks()
        .withFaceDescriptor();

    if(!detection){
        document.getElementById("faceStatus").innerText = "❌ No face detected";
        return;
    }

    savedFace = Array.from(detection.descriptor);

    document.getElementById("faceStatus").innerText = "✅ Face captured";
}

// =======================
// SIGNUP
// =======================
async function signup(){
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if(!username || !password){
        alert("Fill all fields");
        return;
    }

    if(!savedFingerprint){
        alert("Scan fingerprint first");
        return;
    }

    if(!savedFace){
        alert("Scan face first");
        return;
    }

    const res = await fetch('/signup',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            username,
            password,
            fingerprint: savedFingerprint,
            face: savedFace
        })
    });

    const data = await res.json();

    if(data.success){
        alert("🎉 Signup complete!");
    } else {
        alert("Signup failed");
    }
}

// =======================
// LOGIN
// =======================
async function login(){
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if(!savedFingerprint){
        alert("Scan fingerprint first");
        return;
    }

    if(!savedFace){
        alert("Scan face first");
        return;
    }

    const res = await fetch('/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            username,
            password,
            fingerprint: savedFingerprint,
            face: savedFace
        })
    });

    const data = await res.json();

    if(data.success){
        alert("✅ Login success!");
    } else {
        alert("❌ Access denied");
    }
}

</script>

</body>
</html>
