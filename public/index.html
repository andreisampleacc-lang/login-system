<!DOCTYPE html>
<html>
<head>
<title>Biometric System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box {
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    width:300px;
}
video {
    width:100%;
    border-radius:10px;
}
button,input {
    margin:5px;
    padding:10px;
    width:90%;
}
</style>
</head>

<body>

<div class="box">
<h2>Biometric Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<br><br>

<video id="video" autoplay></video>
</div>

<script>

// =======================
// LOAD FACE MODELS
// =======================
async function loadModels(){
    await faceapi.nets.tinyFaceDetector.loadFromUri('/models');
    await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
    await faceapi.nets.faceRecognitionNet.loadFromUri('/models');
}
loadModels();

// =======================
// CAMERA
// =======================
async function startCamera(){
    const video = document.getElementById("video");
    const stream = await navigator.mediaDevices.getUserMedia({ video:true });
    video.srcObject = stream;
}

// =======================
// CAPTURE FACE
// =======================
async function captureFace(){
    const video = document.getElementById("video");

    const detection = await faceapi
        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
        .withFaceLandmarks()
        .withFaceDescriptor();

    if(!detection){
        alert("No face detected!");
        return null;
    }

    return Array.from(detection.descriptor);
}

// =======================
// 🔥 FINGERPRINT (LOCAL SERVER)
// =======================
async function scanFingerprint(){
    const res = await fetch('http://localhost:5000/scan-fingerprint');
    const data = await res.json();

    if(data.success){
        alert("Fingerprint captured!");
        return data.template;
    } else {
        alert("Fingerprint failed");
        return null;
    }
}

// =======================
// SIGNUP
// =======================
async function signup(){
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if(!username || !password){
        alert("Fill all fields");
        return;
    }

    await startCamera();

    // 🔐 Fingerprint
    const fingerprint = await scanFingerprint();
    if(!fingerprint) return;

    // 📸 Face
    const face = await captureFace();
    if(!face) return;

    // 📤 SEND TO SERVER
    const res = await fetch('/signup',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username, password, fingerprint, face })
    });

    const data = await res.json();

    if(data.success){
        alert("Signup complete!");
    } else {
        alert("Signup failed: " + data.error);
    }
}

// =======================
// LOGIN
// =======================
async function login(){
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if(!username || !password){
        alert("Fill all fields");
        return;
    }

    await startCamera();

    // 🔐 Fingerprint
    const fingerprint = await scanFingerprint();
    if(!fingerprint) return;

    // 📸 Face
    const face = await captureFace();
    if(!face) return;

    const res = await fetch('/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username, password, fingerprint, face })
    });

    const data = await res.json();

    if(data.success){
        alert("Login success!");
    } else {
        alert("Access denied: " + data.error);
    }
}

</script>

</body>
</html>
