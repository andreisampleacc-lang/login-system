<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script defer src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box {
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    width:280px;
}
input,button {
    margin:5px;
    padding:10px;
    width:90%;
}
video {
    width:100%;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Log In</button>
<button onclick="startSignup()">Sign Up</button>

<br><br>

<button id="scanFaceBtn" onclick="scanFace()" style="display:none;">
Scan Face
</button>

<video id="video" autoplay muted></video>

</div>

<script>

let savedFace = null;
let savedFingerprint = null;
let mode = ""; // login or signup

// LOAD MODELS
async function loadModels(){
    await faceapi.nets.tinyFaceDetector.loadFromUri('/models/tiny_face_detector');
    await faceapi.nets.faceLandmark68Net.loadFromUri('/models/face_landmark_68');
    await faceapi.nets.faceRecognitionNet.loadFromUri('/models/face_recognition');
}
loadModels();

// CAMERA
async function startCamera(){
    const video = document.getElementById("video");
    const stream = await navigator.mediaDevices.getUserMedia({
        video:true
    });
    video.srcObject = stream;
}

// =======================
// SIGN UP START
// =======================
function startSignup(){
    mode = "signup";
    document.getElementById("scanFaceBtn").style.display = "block";
    alert("Click Scan Face to start");
}

// =======================
// LOGIN START
// =======================
async function login(){
    const username = usernameInput();
    const password = passwordInput();

    const res = await fetch('/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if(!data.exists){
        alert("❌ No account found");
        return;
    }

    mode = "login";
    document.getElementById("scanFaceBtn").style.display = "block";
    alert("Scan your face");
}

// =======================
// FACE SCAN
// =======================
async function scanFace(){

    await startCamera();

    alert("📸 Scanning face...");

    const video = document.getElementById("video");

    const detection = await faceapi
        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
        .withFaceLandmarks()
        .withFaceDescriptor();

    if(!detection){
        alert("❌ No face detected");
        return;
    }

    savedFace = Array.from(detection.descriptor);

    alert("✅ Face captured");

    if(mode === "signup"){
        scanFingerprintSignup();
    } else {
        verifyFaceLogin();
    }
}

// =======================
// SIGNUP FLOW
// =======================
async function scanFingerprintSignup(){

    const fingerprint = await scanFingerprint();
    if(!fingerprint) return;

    const res = await fetch('/signup',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            username: usernameInput(),
            password: passwordInput(),
            face: savedFace,
            fingerprint
        })
    });

    const data = await res.json();

    if(data.success){
        alert("🎉 Signup complete!");
    } else {
        alert("Signup failed");
    }
}

// =======================
// LOGIN FACE CHECK
// =======================
async function verifyFaceLogin(){

    const res = await fetch('/login-face',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            username: usernameInput(),
            face: savedFace
        })
    });

    const data = await res.json();

    if(!data.success){
        alert("❌ Face not matched");
        return;
    }

    alert("✅ Face matched");

    verifyFingerprintLogin();
}

// =======================
// LOGIN FINGERPRINT
// =======================
async function verifyFingerprintLogin(){

    const fingerprint = await scanFingerprint();
    if(!fingerprint) return;

    const res = await fetch('/login-fingerprint',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            username: usernameInput(),
            fingerprint
        })
    });

    const data = await res.json();

    if(data.success){
        alert("✅ Login success!");
    } else {
        alert("❌ Fingerprint mismatch");
    }
}

// =======================
// FINGERPRINT (LOCAL)
// =======================
async function scanFingerprint(){
    try{
        const res = await fetch('http://localhost:5000/scan-fingerprint');
        const data = await res.json();

        if(data.success){
            alert("Fingerprint captured");
            return data.template;
        }
    }catch{
        alert("Fingerprint server not running");
    }
    return null;
}

// HELPERS
function usernameInput(){
    return document.getElementById("username").value;
}
function passwordInput(){
    return document.getElementById("password").value;
}

</script>

</body>
</html>
