<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:white;
    padding:30px;
    border-radius:10px;
    text-align:center;
    width:300px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button {
    padding:10px;
    width:100%;
    margin-top:15px;
    border:none;
    background:#4facfe;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover {
    background:#007bff;
}
</style>
</head>

<body>

<div class="box">
    <h2>Welcome, <span id="user"></span></h2>
    <p>You are successfully logged in ✅</p>

    <button onclick="logout()">Logout</button>
</div>

<script>
// 🔐 PROTECT PAGE
fetch('/session')
.then(res => res.json())
.then(data => {
    if (!data.loggedIn) {
        window.location = "login.html";
    } else {
        document.getElementById("user").innerText = data.user;
    }
});

// 🚪 LOGOUT
function logout(){
    fetch('/logout')
    .then(() => {
        window.location = "login.html";
    });
}
</script>

</body>
</html>
